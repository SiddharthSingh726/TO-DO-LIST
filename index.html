<html lang="en">
<head>

<title>TaskFlow Pro</title>
<style>

.cal{display:grid;grid-template-columns:1.3fr .7fr;gap:10px}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;border:1px solid var(--line);border-radius:12px;padding:8px;background:color-mix(in oklab,var(--surface) 82%,var(--bg))}
.wd{font-size:.73rem;color:var(--muted);text-transform:uppercase;text-align:center}

.day.sel{border-color:var(--accent);box-shadow:0 0 0 2px color-mix(in oklab,var(--accent) 25%,transparent),0 8px 16px color-mix(in oklab,var(--accent) 18%,transparent),0 0 24px color-mix(in oklab,var(--accent) 12%,transparent);background:color-mix(in oklab,var(--surface) 92%,var(--accent) 8%)}

.stats{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.stat{border:1px solid var(--line);border-radius:10px;padding:8px;background:color-mix(in oklab,var(--surface) 80%,var(--bg));transition:transform .26s ease,box-shadow .26s ease,background .3s ease,border-color .26s ease;cursor:default}.stat:hover{transform:translateY(-2px);border-color:var(--accent);box-shadow:0 8px 18px color-mix(in oklab,var(--accent) 14%,transparent),0 0 28px color-mix(in oklab,var(--glow2) 16%,transparent)}.stat b{display:block;font-size:1.25rem;transition:text-shadow .3s ease}.stat:hover b{text-shadow:0 0 14px color-mix(in oklab,var(--accent) 45%,transparent)}.stat span{font-size:.73rem;color:var(--muted);text-transform:uppercase}

.empty{border:1px dashed var(--line);border-radius:12px;padding:22px;text-align:center;color:var(--muted)}

<body data-theme="light">
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div style="display:flex;gap:9px;align-items:center"><div class="logo">TF</div><div class="txt"><h1>TaskFlow Pro</h1><p>Advanced productivity cockpit</p></div></div><button class="mini" data-a="theme">Theme</button></div>
    <div id="views" class="views"></div>
    <div><div class="hdr"><h3>Projects</h3><button class="chip" data-a="new-project">+ Project</button></div><div id="projects" class="list"></div></div>
    <div><div class="hdr"><h3>Tags</h3><button class="chip" data-a="new-tag">+ Tag</button></div><div id="tags" class="list"></div></div>
    <div class="hint"><b>Shortcuts</b><span><code>N</code> new task</span><span><code>/</code> search</span><span><code>1-4</code> switch view</span><span><code>Ctrl/Cmd+Z,Y</code> history</span></div>
  </aside>
  <main>
    <header class="toolbar">
      <div class="row">
        <input id="search" type="search" placeholder="Search tasks, notes, projects, tags" />
        <select id="f-status"><option value="all">Status: All</option><option value="todo">Todo</option><option value="in-progress">In Progress</option><option value="done">Done</option></select>
        <select id="f-priority"><option value="all">Priority: All</option><option value="low">Low</option><option value="medium">Medium</option><option value="high">High</option><option value="critical">Critical</option></select>
        <select id="f-project" class="hide-sm"></select>
        <select id="f-date" class="hide-md"><option value="all">Date: Any</option><option value="today">Due Today</option><option value="week">Due Week</option><option value="overdue">Overdue</option></select>
        <select id="f-time" class="hide-md"><option value="all">Time: Any</option><option value="scheduled">Has Window</option><option value="active">Active Now</option><option value="upcoming">Upcoming</option></select>
      </div>
      <div class="actions">
        <select id="sort"><option value="manual">Sort: Manual</option><option value="due">Due</option><option value="priority">Priority</option><option value="created">Created</option></select>
        <span id="sel" class="badge">0 selected</span>
        <button class="btn ghost" data-a="bulk-done">Complete Selected</button>
        <button class="btn warn" data-a="bulk-del">Delete Selected</button>
        <button class="btn ghost" data-a="undo">Undo</button>
        <button class="btn ghost" data-a="redo">Redo</button>
        <button class="btn ghost" data-a="import">Import</button>
        <button class="btn ghost" data-a="export">Export</button>
        <button class="btn primary" data-a="new-task">+ New Task</button>
      </div>
    </header>
    <section id="root"></section>
  </main>
</div>
<div id="modal" class="modal hidden"></div>
<div id="toasts" class="toasts"></div>
<input id="import-file" type="file" hidden accept=".json,application/json" />
<script>
(()=>{
'use strict';
const KEY='taskflow_state_v2',MAX_HISTORY=80;
const views=[['list','List'],['kanban','Kanban'],['calendar','Calendar'],['analytics','Analytics']];
const statuses=[['todo','Todo'],['in-progress','In Progress'],['done','Done']];
const priRank={low:1,medium:2,high:3,critical:4};
let dragId=null;
const reduceMotion=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const $=s=>document.querySelector(s);
const refs={views:$('#views'),projects:$('#projects'),tags:$('#tags'),search:$('#search'),fs:$('#f-status'),fp:$('#f-priority'),fproj:$('#f-project'),fd:$('#f-date'),ftime:$('#f-time'),sort:$('#sort'),sel:$('#sel'),root:$('#root'),modal:$('#modal'),toasts:$('#toasts'),imp:$('#import-file')};
let state=norm(load());
let lastView=state.view;
let pendingViewDir='forward';
let calendarShift=0;
if(genRecurring())save();
bind();render();initAurora();

function bind(){
document.addEventListener('click',onClick);document.addEventListener('input',onInput);document.addEventListener('change',onChange);document.addEventListener('keydown',onKey);
document.addEventListener('pointerdown',onPointerDown,{passive:true});
document.addEventListener('pointermove',onPointerMove);
document.addEventListener('pointerout',onPointerOut);
document.addEventListener('dragstart',onDragStart);document.addEventListener('dragover',onDragOver);document.addEventListener('drop',onDrop);document.addEventListener('dragend',onDragEnd);
refs.imp.addEventListener('change',onImport);
window.addEventListener('resize',()=>state.view==='analytics'&&drawCharts());
}
function viewDirection(fromView,toView){const order=['list','kanban','calendar','analytics'];const a=order.indexOf(fromView),b=order.indexOf(toView);if(a<0||b<0||a===b)return'forward';return b>a?'forward':'back';}
function queueViewTransition(nextView){pendingViewDir=viewDirection(state.view,nextView);}
function clearDropHot(){document.querySelectorAll('.col.drop-hot').forEach(z=>z.classList.remove('drop-hot'));}
function onClick(e){const b=e.target.closest('[data-a]');if(!b)return;const a=b.dataset.a;switch(a){
case 'theme':setState(s=>s.theme=s.theme==='dark'?'light':'dark',{record:false});break;
case 'view':{const next=b.dataset.v;if(!next||next===state.view)break;queueViewTransition(next);calendarShift=0;setState(s=>s.view=next,{record:false});break;}
case 'new-task':taskModal();break;
case 'edit-task':taskModal(b.dataset.id);break;
case 'del-task':confirmBox('Delete Task',`Delete "${(byId(b.dataset.id)||{}).title||''}"?`,()=>delTask(b.dataset.id));break;
case 'toggle-task':{const t=byId(b.dataset.id),willComplete=t&&t.status!=='done';toggleTask(b.dataset.id);if(willComplete)spark(b,14);break;}
case 'new-project':editProject();break;
case 'edit-project':editProject(b.dataset.id);break;
case 'del-project':confirmBox('Delete Project','Tasks will be moved to no project.',()=>delProject(b.dataset.id));break;
case 'pick-project':setState(s=>{s.activeProject=b.dataset.id||'all';s.filters.project=s.activeProject;},{record:false});break;
case 'new-tag':editTag();break;
case 'edit-tag':editTag(b.dataset.id);break;
case 'del-tag':confirmBox('Delete Tag','Tag will be removed from tasks.',()=>delTag(b.dataset.id));break;
case 'pick-tag':setState(s=>{const t=b.dataset.id,i=s.filters.tags.indexOf(t);i>-1?s.filters.tags.splice(i,1):s.filters.tags.push(t);},{record:false});break;
case 'clear-tags':setState(s=>s.filters.tags=[],{record:false});break;
case 'clear-filters':setState(s=>{s.filters={status:'all',priority:'all',project:'all',tags:[],search:'',date:'all',time:'all'};s.activeProject='all';s.selectedDay=null;},{record:false});break;
case 'bulk-done':bulkDone();spark(b,18);break;
case 'bulk-del':bulkDelete();break;
case 'undo':undo();break;case 'redo':redo();break;
case 'export':exp();break;case 'import':refs.imp.click();break;
case 'prev-m':calendarShift=-1;pendingViewDir='back';setState(s=>s.month=shiftMonth(s.month,-1),{record:false});break;
case 'next-m':calendarShift=1;pendingViewDir='forward';setState(s=>s.month=shiftMonth(s.month,1),{record:false});break;
case 'pick-day':setState(s=>s.selectedDay=s.selectedDay===b.dataset.day?null:b.dataset.day,{record:false});break;
case 'close-modal':closeModal();break;
}}
function onInput(e){if(e.target.id==='search')setState(s=>s.filters.search=e.target.value,{record:false});}
function onChange(e){const t=e.target;if(t.id==='f-status')setState(s=>s.filters.status=t.value,{record:false});
if(t.id==='f-priority')setState(s=>s.filters.priority=t.value,{record:false});
if(t.id==='f-project')setState(s=>{s.filters.project=t.value;s.activeProject=t.value;},{record:false});
if(t.id==='f-date')setState(s=>s.filters.date=t.value,{record:false});
if(t.id==='f-time')setState(s=>s.filters.time=t.value,{record:false});
if(t.id==='sort')setState(s=>s.sort=t.value,{record:false});
if(t.classList.contains('tsel')){const id=t.dataset.id;setState(s=>{const i=s.selection.indexOf(id);if(t.checked&&i<0)s.selection.push(id);if(!t.checked&&i>-1)s.selection.splice(i,1);},{record:false});}
if(t.classList.contains('subtoggle')){const task=byId(t.dataset.tid);if(!task)return;setState(s=>{const tt=s.tasks.find(x=>x.id===t.dataset.tid);const st=tt.subtasks.find(x=>x.id===t.dataset.sid);if(st)st.done=t.checked;});}
}
function onKey(e){if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='z'){e.preventDefault();undo();return;}if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==='y'){e.preventDefault();redo();return;}
if(e.key==='Escape'&&!refs.modal.classList.contains('hidden')){closeModal();return;}
const typing=/input|textarea|select/i.test((e.target&&e.target.tagName)||'');if(!typing&&e.key==='/'){e.preventDefault();refs.search.focus();refs.search.select();return;}if(typing)return;
if(e.key.toLowerCase()==='n'){e.preventDefault();taskModal();}
if(['1','2','3','4'].includes(e.key)){const map={1:'list',2:'kanban',3:'calendar',4:'analytics'};const next=map[e.key];if(next&&next!==state.view){queueViewTransition(next);calendarShift=0;setState(s=>s.view=next,{record:false});}}
if(e.key==='Delete'&&state.selection.length)bulkDelete();
}
function onDragStart(e){const c=e.target.closest('.card');if(!c)return;dragId=c.dataset.id;c.classList.add('drag');e.dataTransfer.effectAllowed='move';}
function onDragOver(e){if(!dragId)return;const z=e.target.closest('[data-drop]');const c=e.target.closest('.card');if(z||c)e.preventDefault();if(z&&z.dataset.drop==='kanban'&&z.classList.contains('col')){document.querySelectorAll('.col.drop-hot').forEach(el=>{if(el!==z)el.classList.remove('drop-hot')});z.classList.add('drop-hot');}else if(!c){clearDropHot();}}
function onDrop(e){if(!dragId)return;const id=dragId;const z=e.target.closest('[data-drop]');const c=e.target.closest('.card');if(!z&&!c){dragId=null;return;}e.preventDefault();
setState(s=>{const t=s.tasks.find(x=>x.id===id);if(!t)return;if(z&&z.dataset.drop==='kanban')t.status=z.dataset.status;if(t.status==='done'&&!t.completed)t.completed=new Date().toISOString();if(t.status!=='done')t.completed='';moveOrder(s.order,id,c&&c.dataset.id);});dragId=null;clearDropHot();}

return `<section class="panel"><div class="head"><div><h2>${new Intl.DateTimeFormat('en-US',{month:'long',year:'numeric'}).format(new Date(y,m-1,1))}</h2><p class="sub">Due-date calendar</p></div><div style="display:flex;gap:8px"><button class="btn ghost" data-a="prev-m">Previous</button><button class="btn ghost" data-a="next-m">Next</button></div></div><div class="cal"><div class="grid">${cells.join('')}</div><aside class="side"><b style="font-size:.8rem;color:var(--muted);text-transform:uppercase">${state.selectedDay?fmtDate(state.selectedDay):'Select a day'}</b>${state.selectedDay?(sel.length?sel.map((t,idx)=>taskCard(t,true,idx)).join(''):'<div class="empty">No tasks due</div>'):'<div class="empty">Click a date cell</div>'}</aside></div></section>`;}
function viewAnalytics(){const t=state.tasks,total=t.length,done=t.filter(x=>x.status==='done').length,td=today(),dueToday=t.filter(x=>x.due===td).length,over=t.filter(x=>x.due&&x.due<td&&x.status!=='done').length;
const doneDays=new Set(t.filter(x=>x.completed).map(x=>dateStr(new Date(x.completed))));let streak=0,cur=new Date();while(doneDays.has(dateStr(cur))){streak++;cur=addDays(cur,-1);}return `<section class="panel"><div class="head"><div><h2>Analytics</h2><p class="sub">Completion trends and priority distribution</p></div></div><div class="stats"><div class="stat" style="--sidx:0"><span>Total</span><b class="num" data-val="${total}" data-sfx=""></b></div><div class="stat" style="--sidx:1"><span>Completed</span><b class="num" data-val="${done}" data-sfx=""></b></div><div class="stat" style="--sidx:2"><span>Due Today</span><b class="num" data-val="${dueToday}" data-sfx=""></b></div><div class="stat" style="--sidx:3"><span>Overdue</span><b class="num" data-val="${over}" data-sfx=""></b></div><div class="stat" style="--sidx:4"><span>Streak</span><b class="num" data-val="${streak}" data-sfx="d"></b></div></div><div class="charts"><div class="chart" style="--cidx:0"><h4>Completions (7 days)</h4><canvas id="c1"></canvas></div><div class="chart" style="--cidx:1"><h4>Priority Mix</h4><canvas id="c2"></canvas></div></div></section>`;}
function taskCard(t,compact=false,idx=0){if(!t)return'';const p=projectBy(t.project),sel=state.selection.includes(t.id)?'checked':'',due=dueTag(t),tags=t.tags.map(i=>tagBy(i)).filter(Boolean),tw=timeWindowMeta(t);
const tcls=tw.active?'time-active':(tw.upcoming?'time-upcoming':'');
const ttxt=tw.active?'Now':(tw.upcoming?'Upcoming':'Window');
return `<article class="card ${t.status==='done'?'done':''}" style="--stagger:${idx}" data-id="${t.id}" draggable="true"><div class="ctop"><input class="tsel" data-id="${t.id}" type="checkbox" ${sel}><div><h3 class="ctitle">${esc(t.title)}</h3>${compact||!t.desc?'':`<p class="cdesc">${esc(t.desc)}</p>`}<div class="cmeta"><span class="tag">${statusLabel(t.status)}</span><span class="tag">${t.priority}</span>${due?`<span class="tag">${due}</span>`:''}${tw.scheduled?`<span class="tag ${tcls}">${ttxt}: ${esc(tw.label)}</span>`:''}${p?`<span class="tag">${esc(p.icon||'#')} ${esc(p.name)}</span>`:''}${t.recurring!=='none'?`<span class="tag">${t.recurring}</span>`:''}${tags.map(x=>`<span class="tag" style="border-color:${esc(x.color)};color:${esc(x.color)}">#${esc(x.name)}</span>`).join('')}</div></div><div class="cact"><button class="mini" data-a="toggle-task" data-id="${t.id}">${t.status==='done'?'Reopen':'Done'}</button><button class="mini" data-a="edit-task" data-id="${t.id}">Edit</button><button class="mini" data-a="del-task" data-id="${t.id}">Delete</button></div></div>${compact||!t.subtasks.length?'':`<ul class="subs">${t.subtasks.map(s=>`<li><label><input class="subtoggle" data-tid="${t.id}" data-sid="${s.id}" type="checkbox" ${s.done?'checked':''}>${esc(s.title)}</label></li>`).join('')}</ul>`}</article>`;}
function dueTag(t){if(!t.due)return'';const td=today();if(t.due<td&&t.status!=='done')return`Overdue ${fmtDate(t.due)}`;if(t.due===td)return'Due Today';return`Due ${fmtDate(t.due)}`;}
function prioColor(p){return({low:'#8eb5c5',medium:'#d9b66d',high:'#e88854',critical:'#d95f55'}[p]||'#0d7a84');}

function taskModal(id=''){const cur=id?byId(id):null;const subs=cur?clone(cur.subtasks):[{id:idGen('sub'),title:'',done:false}];
const form=document.createElement('div');form.innerHTML=`<div class="mw"><label>Title<input class="field" name="title" maxlength="140"></label></div><div class="mw"><label>Description<textarea name="desc" rows="3"></textarea></label></div><div class="fg"><div class="mw"><label>Status<select name="status">${statuses.map(s=>`<option value="${s[0]}">${s[1]}</option>`).join('')}</select></label></div><div class="mw"><label>Priority<select name="priority"><option>low</option><option>medium</option><option>high</option><option>critical</option></select></label></div><div class="mw"><label>Due Date<input class="field" type="date" name="due"></label></div><div class="mw"><label>Project<select name="project"><option value="">None</option>${state.projects.map(p=>`<option value="${p.id}">${esc(p.icon||'#')} ${esc(p.name)}</option>`).join('')}</select></label></div><div class="mw"><label>Start Time<input class="field" type="time" name="timeStart"></label></div><div class="mw"><label>End Time<input class="field" type="time" name="timeEnd"></label></div><div class="mw" style="grid-column:1/-1"><label>Recurring<select name="recurring"><option value="none">none</option><option value="daily">daily</option><option value="weekly">weekly</option><option value="monthly">monthly</option></select></label></div></div><div class="mw"><label>Tags</label><div class="tags">${state.tags.map(t=>`<label><input type="checkbox" name="tags" value="${t.id}"><span class="dot" style="background:${esc(t.color)}"></span>#${esc(t.name)}</label>`).join('')}</div></div><div class="mw"><label>Subtasks</label><div class="subedit"><div id="slist"></div><button class="btn ghost" type="button" id="addsub">+ Add Subtask</button></div></div>`;
openModal(cur?'Edit Task':'Create Task',form,cur?'Save Task':'Create Task',()=>{const title=form.querySelector('[name=title]').value.trim();if(!title){toast('Task title required','err');return false;}const timeStartRaw=form.querySelector('[name=timeStart]').value,timeEndRaw=form.querySelector('[name=timeEnd]').value;const hasStart=!!timeStartRaw,hasEnd=!!timeEndRaw;if(hasStart!==hasEnd){toast('Set both start and end time, or leave both empty.','err');return false;}const win=normWindow(timeStartRaw,timeEndRaw);if((hasStart||hasEnd)&&(!win.timeStart||!win.timeEnd)){toast('Use a valid time window. Start and end cannot be the same.','err');return false;}const payload={title,desc:form.querySelector('[name=desc]').value.trim(),status:form.querySelector('[name=status]').value,priority:form.querySelector('[name=priority]').value,due:form.querySelector('[name=due]').value,timeStart:win.timeStart,timeEnd:win.timeEnd,project:form.querySelector('[name=project]').value,tags:[...form.querySelectorAll('[name=tags]:checked')].map(x=>x.value),subtasks:[...form.querySelectorAll('.subin')].map(i=>({id:i.dataset.id,title:i.value.trim(),done:false})).filter(s=>s.title),recurring:form.querySelector('[name=recurring]').value};
if(cur){setState(s=>{const t=s.tasks.find(x=>x.id===cur.id);Object.assign(t,payload);t.subtasks=mergeSubs(t.subtasks,payload.subtasks);if(t.status==='done'&&!t.completed)t.completed=new Date().toISOString();if(t.status!=='done')t.completed='';});toast('Task updated');}
else{setState(s=>{const nid=idGen('task'),now=new Date().toISOString();s.tasks.unshift({id:nid,...payload,origin:nid,created:now,completed:payload.status==='done'?now:''});s.order.unshift(nid);});toast('Task created');}
return true;});
const setSub=()=>{form.querySelector('#slist').innerHTML=subs.map(s=>`<div class="subline"><input class="field subin" data-id="${s.id}" value="${esc(s.title)}" maxlength="160"><button class="mini rem" data-id="${s.id}" type="button">Remove</button></div>`).join('');};
form.querySelector('#addsub').onclick=()=>{subs.push({id:idGen('sub'),title:'',done:false});setSub();};form.addEventListener('click',e=>{const r=e.target.closest('.rem');if(!r)return;const i=subs.findIndex(x=>x.id===r.dataset.id);if(i>-1)subs.splice(i,1);if(!subs.length)subs.push({id:idGen('sub'),title:'',done:false});setSub();});setSub();
if(cur){form.querySelector('[name=title]').value=cur.title;form.querySelector('[name=desc]').value=cur.desc||'';form.querySelector('[name=status]').value=cur.status;form.querySelector('[name=priority]').value=cur.priority;form.querySelector('[name=due]').value=cur.due||'';form.querySelector('[name=timeStart]').value=cur.timeStart||'';form.querySelector('[name=timeEnd]').value=cur.timeEnd||'';form.querySelector('[name=project]').value=cur.project||'';form.querySelector('[name=recurring]').value=cur.recurring||'none';const st=new Set(cur.tags);form.querySelectorAll('[name=tags]').forEach(c=>c.checked=st.has(c.value));}
else{form.querySelector('[name=status]').value='todo';form.querySelector('[name=priority]').value='medium';if(state.activeProject!=='all')form.querySelector('[name=project]').value=state.activeProject;}
}
function mergeSubs(oldS,newS){const m=new Map((oldS||[]).map(x=>[x.id,!!x.done]));return newS.map(s=>({id:s.id||idGen('sub'),title:s.title,done:m.has(s.id)?m.get(s.id):false}));}
function idGen(p){return id(p);}function toggleTask(i){let doneNow=false;setState(s=>{const t=s.tasks.find(x=>x.id===i);if(!t)return;t.status=t.status==='done'?'todo':'done';t.completed=t.status==='done'?new Date().toISOString():'';doneNow=t.status==='done';});if(doneNow)animateDone(i);}
function bulkDone(){if(!state.selection.length)return;const ids=[...state.selection];setState(s=>{const now=new Date().toISOString();s.tasks.forEach(t=>{if(s.selection.includes(t.id)){t.status='done';t.completed=now;}});});ids.slice(0,8).forEach(animateDone);toast('Selected tasks completed');}
function bulkDelete(){if(!state.selection.length)return;confirmBox('Delete Selected',`Delete ${state.selection.length} selected task(s)?`,()=>setState(s=>{s.tasks=s.tasks.filter(t=>!s.selection.includes(t.id));s.order=s.order.filter(i=>!s.selection.includes(i));s.selection=[];}));}
function delProject(i){setState(s=>{s.projects=s.projects.filter(p=>p.id!==i);s.tasks.forEach(t=>{if(t.project===i)t.project='';});if(s.activeProject===i||s.filters.project===i){s.activeProject='all';s.filters.project='all';}});}
function delTag(i){setState(s=>{s.tags=s.tags.filter(t=>t.id!==i);s.tasks.forEach(t=>t.tags=t.tags.filter(x=>x!==i));s.filters.tags=s.filters.tags.filter(x=>x!==i);});}
function editProject(i=''){const cur=i?projectBy(i):null;const name=prompt(cur?'Edit project name':'Project name',cur?cur.name:'');if(!name||!name.trim())return;const color=prompt('Project color (hex)',cur?cur.color:'#0d7a84')||'#0d7a84';const icon=prompt('Project icon/prefix',cur?cur.icon:'P')||'#';if(cur)setState(s=>{const p=s.projects.find(x=>x.id===cur.id);p.name=name.trim();p.color=color;p.icon=icon.slice(0,4);});else setState(s=>s.projects.push({id:idGen('proj'),name:name.trim(),color,icon:icon.slice(0,4)}));}
function editTag(i=''){const cur=i?tagBy(i):null;const name=prompt(cur?'Edit tag name':'Tag name',cur?cur.name:'');if(!name||!name.trim())return;const color=prompt('Tag color (hex)',cur?cur.color:'#e97842')||'#e97842';if(cur)setState(s=>{const t=s.tags.find(x=>x.id===cur.id);t.name=name.trim();t.color=color;});else setState(s=>s.tags.push({id:idGen('tag'),name:name.trim(),color}));}

function openModal(title,content,saveLabel,onSave,size=''){refs.modal.classList.remove('hidden');refs.modal.innerHTML=`<div class="mbg" data-a="close-modal"></div><section class="box ${size}"><div class="mh"><h3>${esc(title)}</h3><button class="mini" data-a="close-modal">Close</button></div><div class="mf" id="mform"></div><div class="foot"><button class="btn ghost" data-a="close-modal">Cancel</button><button class="btn primary" id="msave">${esc(saveLabel)}</button></div></section>`;refs.modal.querySelector('#mform').append(content);refs.modal.querySelector('#msave').onclick=()=>{const ok=onSave?onSave():true;if(ok!==false)closeModal();};}
function closeModal(){refs.modal.classList.add('hidden');refs.modal.innerHTML='';}
function confirmBox(title,msg,onYes){const d=document.createElement('div');d.innerHTML=`<p style="margin:0;color:var(--muted)">${esc(msg)}</p>`;openModal(title,d,'Confirm',()=>{onYes&&onYes();return true;},'small');}

function exp(){const payload=clone(state);payload.undo=[];payload.redo=[];payload.selection=[];const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}),u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=`taskflow-export-${today()}.json`;a.click();URL.revokeObjectURL(u);toast('Exported');}
function onImport(e){const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=norm(JSON.parse(String(r.result||'{}')));state.undo=[];state.redo=[];save();render();toast('Imported');}catch{toast('Invalid import file','err');}refs.imp.value='';};r.readAsText(f);} 

function animateStatNumbers(){const nums=[...refs.root.querySelectorAll('.num[data-val]')];if(!nums.length)return;const values=nums.map(n=>({el:n,val:Number(n.dataset.val||0),sfx:n.dataset.sfx||''}));if(reduceMotion){for(const item of values)item.el.textContent=`${item.val}${item.sfx}`;return;}const dur=620,start=performance.now();function step(ts){const p=Math.min(1,(ts-start)/dur),ease=1-Math.pow(1-p,3);for(const item of values){item.el.textContent=`${Math.round(item.val*ease)}${item.sfx}`;}if(p<1)requestAnimationFrame(step);}for(const item of values){item.el.textContent=`0${item.sfx}`;}requestAnimationFrame(step);}
function drawCharts(){const c1=document.getElementById('c1'),c2=document.getElementById('c2');if(!c1||!c2)return;if(reduceMotion){bar(c1,1);pie(c2,1);return;}const dur=620,start=performance.now();function loop(ts){const p=Math.min(1,(ts-start)/dur),ease=1-Math.pow(1-p,3);bar(c1,ease);pie(c2,ease);if(p<1)requestAnimationFrame(loop);}requestAnimationFrame(loop);} 
function fitCanvas(c){const r=c.getBoundingClientRect(),d=window.devicePixelRatio||1;c.width=Math.max(1,Math.floor(r.width*d));c.height=Math.max(1,Math.floor(r.height*d));const x=c.getContext('2d');x.setTransform(d,0,0,d,0,0);return {x,w:r.width,h:r.height};}
function bar(c,p=1){const {x,w,h}=fitCanvas(c),pad={l:30,r:16,t:16,b:32},cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;const labels=[],vals=[];for(let i=6;i>=0;i--){const d=addDays(new Date(),-i),s=dateStr(d);labels.push(new Intl.DateTimeFormat('en-US',{weekday:'short'}).format(d));vals.push(state.tasks.filter(t=>t.completed&&dateStr(new Date(t.completed))===s).length);}const m=Math.max(1,...vals),bw=cw/vals.length*.68,g=cw/vals.length;x.clearRect(0,0,w,h);x.strokeStyle='rgba(120,130,140,.45)';x.beginPath();x.moveTo(pad.l,pad.t+ch);x.lineTo(pad.l+cw,pad.t+ch);x.stroke();x.font='12px Space Grotesk';x.textAlign='center';vals.forEach((v,i)=>{const hh=v/m*(ch-8)*p,xx=pad.l+i*g+(g-bw)/2,yy=pad.t+ch-hh;x.fillStyle='#0d7a84';x.fillRect(xx,yy,bw,hh);x.fillStyle='rgba(90,100,110,.95)';x.fillText(labels[i],xx+bw/2,h-10);x.fillText(String(Math.round(v*p)),xx+bw/2,yy-5);});}
function pie(c,p=1){const {x,w,h}=fitCanvas(c);const keys=['low','medium','high','critical'],labs=['Low','Medium','High','Critical'],cols=['#8eb5c5','#d9b66d','#e88854','#d95f55'];const vals=keys.map(k=>state.tasks.filter(t=>t.priority===k).length),tot=vals.reduce((a,b)=>a+b,0)||1;const cx=w*.35,cy=h*.52,r=Math.min(w,h)*.24;let st=-Math.PI/2,remaining=Math.PI*2*p;x.clearRect(0,0,w,h);vals.forEach((v,i)=>{const full=v/tot*Math.PI*2;const a=Math.max(0,Math.min(full,remaining));if(a>0){const en=st+a;x.beginPath();x.moveTo(cx,cy);x.arc(cx,cy,r,st,en);x.closePath();x.fillStyle=cols[i];x.fill();st=en;}remaining-=a;});x.fillStyle=getComputedStyle(document.body).getPropertyValue('--surface').trim()||'#fff';x.beginPath();x.arc(cx,cy,r*.52,0,Math.PI*2);x.fill();x.font='12px Space Grotesk';x.textAlign='left';labs.forEach((l,i)=>{const y=24+i*21;x.fillStyle=cols[i];x.fillRect(w*.62,y-8,10,10);x.fillStyle='rgba(90,100,110,.95)';x.fillText(`${l}: ${vals[i]}`,w*.62+16,y+1);});}
})();
