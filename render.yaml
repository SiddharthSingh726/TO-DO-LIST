services:
  - type: web
    name: taskflow-pro
    env: node
    plan: free
    buildCommand: ""
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: DB_FILE
        value: /var/data/taskflow-db.json
    disk:
      name: taskflow-data
      mountPath: /var/data
      sizeGB: 1
